<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
</head>
<body>
    <h1>Connexion</h1>
    <form action="/auth/connexion" method="post">
        <div>
            <label>Login : </label>
            <input type="text" id="login" name="login" autocomplete="username">
        </div>
        <div>
            <label>Mot de passe : </label>
            <input type="password" id="password" name="password" autocomplete="current-password">
        </div>
        {% if erreur %}
        <p>{{ erreur }}</p>
        {% endif %}
        <div>
            <button type="submit">Se connecter</button>
        </div>
    </form>
    <p>Pas encore de compte ? <a href="/auth/inscription">S'inscrire</a></p>
</body>
</html>
