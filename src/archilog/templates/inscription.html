<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
</head>
<body>
    <h1>Inscription</h1>
    <form action="/auth/inscription" method="post">
        <div>
            <label>Login : </label>
            <input type="text" id="login" name="login" autocomplete="username">
        </div>
        <div>
            <label>Mot de passe : </label>
            <input type="password" id="password" name="password" autocomplete="new-password">
        </div>
        <div>
            <label>Confirmer le mot de passe : </label>
            <input type="password" id="confirmation" name="confirmation" autocomplete="new-password">
        </div>
        {% if erreur %}
        <p>{{ erreur }}</p>
        {% endif %}
        <div>
            <button type="submit">Créer le compte</button>
        </div>
    </form>
    <p>Déjà un compte ? <a href="/auth/connexion">Se connecter</a></p>
</body>
</html>
